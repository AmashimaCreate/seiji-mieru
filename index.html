<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>政治見える化 — 数字と一次資料で、政治をたどる</title>
<meta name="description" content="国会で成立した法律や、日本に暮らす外国人の数など。政治を、数字と一次資料で見えるかたちに。">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#2f6fb0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--ink:#23303a;--bg:#f3f6f9;--card:#ffffff;--line:#dde6ee;--brand:#2f6fb0;--accent:#9a2b1e;--muted:#6b7884}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;line-height:1.7;min-height:100vh;
  display:flex;flex-direction:column;background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:18px 18px;-webkit-font-smoothing:antialiased}
.wrap{max-width:880px;margin:0 auto;padding:0 24px;width:100%}
header{text-align:center;padding:64px 24px 36px}
.brand{display:inline-flex;align-items:center;gap:12px}
.brand .ic{width:42px;height:42px;border-radius:50%;background:#eaf2fa;display:flex;align-items:center;justify-content:center;flex:none}
.brand h1{font-weight:900;font-size:1.65rem;letter-spacing:.03em}
.lead{margin-top:15px;color:#52626d;font-size:1.04rem}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:6px 0 44px}
@media(max-width:680px){.cards{grid-template-columns:1fr}}
.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
  border-radius:16px;padding:22px 22px 18px;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 2px rgba(40,60,80,.04)}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(40,60,80,.11)}
.card:focus-visible{outline:2px solid var(--brand);outline-offset:3px}
.glimpse{width:100%;height:46px;margin-bottom:15px}
.ctag{display:inline-block;font-size:.64rem;font-weight:700;letter-spacing:.12em;padding:3px 10px;border-radius:99px}
.card.houan .ctag{background:#f6e3df;color:var(--accent)}.card.zairyu .ctag{background:#e2eef7;color:var(--brand)}
.card h2{font-weight:900;font-size:1.3rem;margin:9px 0 7px}
.card p{font-size:.9rem;color:#52626d;flex:1}
.cmeta{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.stat{font-size:.74rem;color:var(--muted)}
.go{font-weight:700;font-size:.86rem;white-space:nowrap}
.card.houan .go{color:var(--accent)}.card.zairyu .go{color:var(--brand)}
footer{margin-top:auto;text-align:center;padding:24px;color:var(--muted);font-size:.74rem;border-top:1px solid var(--line)}
footer a{color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:99px;padding:3px 12px;margin:0 3px;font-weight:600}
footer a:hover{border-color:var(--brand);color:var(--brand)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <span class="ic"><svg width="27" height="27" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="30" fill="#dbe9f6"/>
      <g><rect x="20" y="40" width="24" height="3.5" rx="1" fill="#2f5d8c"/><g fill="#3a78b5"><rect x="22" y="31" width="2.6" height="9"/><rect x="27" y="31" width="2.6" height="9"/><rect x="33" y="31" width="2.6" height="9"/><rect x="39" y="31" width="2.6" height="9"/></g><rect x="20" y="29" width="24" height="2.4" fill="#2f5d8c"/><path d="M20 29 L32 23 L44 29 Z" fill="#3a78b5"/></g>
      <circle cx="30" cy="31" r="11" fill="none" stroke="#1f4e8f" stroke-width="2.6"/><line x1="38" y1="39" x2="45" y2="46" stroke="#1f4e8f" stroke-width="4" stroke-linecap="round"/></svg></span>
    <h1>政治見える化</h1>
  </div>
  <p class="lead">数字と一次資料で、政治をたどる。気になるテーマからどうぞ。</p>
</header>
<main class="cards">
  <a class="card houan" href="houan/">
    <svg class="glimpse" viewBox="0 0 200 46" aria-hidden="true"><line x1="12" y1="23" x2="188" y2="23" stroke="#dde6ee" stroke-width="2"/>
      <circle cx="30" cy="23" r="6" fill="#3a6ea5"/><circle cx="76" cy="23" r="6" fill="#c06a1f"/>
      <circle cx="124" cy="23" r="8" fill="#1f7a4d"/><circle cx="172" cy="23" r="5.5" fill="#a87f32"/>
      <text x="30" y="42" text-anchor="middle" font-size="8" fill="#8a96a0">提出</text><text x="76" y="42" text-anchor="middle" font-size="8" fill="#8a96a0">審議</text>
      <text x="124" y="42" text-anchor="middle" font-size="8" fill="#1f7a4d">成立</text><text x="172" y="42" text-anchor="middle" font-size="8" fill="#8a96a0">公布</text></svg>
    <span class="ctag">立法</span>
    <h2>立法タイムライン</h2>
    <p>国会で成立した法律を、法案ごとに「何が変わる・賛否・議員ごとの投票」で。</p>
    <div class="cmeta"><span class="stat">第217〜221回／成立 135本</span><span class="go">開く →</span></div>
  </a>
  <a class="card zairyu" href="zairyu/">
    <svg class="glimpse" viewBox="0 0 200 46" aria-hidden="true"><g>
      <rect x="150" y="4" width="15" height="15" rx="3" fill="#bcd9ec"/><rect x="132" y="12" width="15" height="15" rx="3" fill="#8fc0dd"/>
      <rect x="114" y="18" width="15" height="15" rx="3" fill="#5aa0d6"/><rect x="96" y="14" width="15" height="15" rx="3" fill="#7bb6d9"/>
      <rect x="78" y="22" width="15" height="15" rx="3" fill="#2f7fb8"/><rect x="60" y="26" width="15" height="15" rx="3" fill="#3a8fc4"/>
      <rect x="42" y="22" width="15" height="15" rx="3" fill="#2f9e8f"/><rect x="26" y="28" width="15" height="15" rx="3" fill="#5ab0a0"/></g></svg>
    <span class="ctag">在留外国人</span>
    <h2>外国人マップ</h2>
    <p>日本に暮らす外国人の数を、都道府県・市区町村ごとの地図で。</p>
    <div class="cmeta"><span class="stat">都道府県・市区町村別</span><span class="go">開く →</span></div>
  </a>
</main>
</div>
<footer>政治見える化プロジェクト　<a href="https://note.com/seiji_mieru" target="_blank" rel="noopener">note</a><a href="https://x.com/seiji_mieru" target="_blank" rel="noopener">X</a></footer>
</body>
</html>
